services:
  - type: web
    name: bopda-manager
    env: php
    plan: free
    buildCommand: composer install --no-dev && npm install && npm run build
    startCommand: php artisan migrate --force && heroku-php-apache2 public/
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr